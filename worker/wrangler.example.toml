name = "irodori"
main = "src/index.ts"
compatibility_date = "2025-09-01"

# ------------------------------------------------------------
# このリポジトリを clone してデプロイする場合の必須カスタマイズ
# ------------------------------------------------------------
# 1) `name` (上記) を任意の Worker 名に変えても OK
# 2) [[d1_databases]] の `database_id` を自分のアカウントで作成した
#    D1 のID に書き換える (`wrangler d1 create irodori` で発行された ID)
# 3) [[r2_buckets]] の `bucket_name` は自分のアカウントで一意な名前に
# 4) 独自ドメインで配信したい場合は最下部の `routes = [...]` のコメントを外し
#    Cloudflare 上で Zone を保有するドメインに書き換える
# 詳しいセットアップ手順は README の "デプロイ" 節を参照
# ------------------------------------------------------------

# 静的アセット (web/dist) を同居させ、API・画像・SPA をすべて一つの Worker で配信。
# - 静的ファイルがあれば優先的に返す
# - 無ければ Worker (Hono) が処理
# - Worker が 404 を返す未知のパスは SPA フォールバックで index.html を返す
[assets]
directory = "../web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "irodori"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "irodori-images"

[vars]
MAX_IMAGE_BYTES = "2097152"
PUBLIC_BASE = ""

# 既定では *.workers.dev サブドメイン (Cloudflare が自動発行) で配信されます。
# 独自ドメインを使う場合は以下を有効化し、Cloudflare に登録済みの Zone を指定してください。
# routes = [
#   { pattern = "irodori.example.com", custom_domain = true }
# ]
